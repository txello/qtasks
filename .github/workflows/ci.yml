name: CI - Lint & Build & Tox

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tox and pyenv
        run: |
          pip install tox tox-gh-actions
          sudo apt-get update
          sudo apt-get install -y make build-essential libssl-dev zlib1g-dev \
              libbz2-dev libreadline-dev libsqlite3-dev curl llvm \
              libncursesw5-dev xz-utils tk-dev libxml2-dev libxmlsec1-dev libffi-dev liblzma-dev
          curl https://pyenv.run | bash

      - name: Add pyenv to PATH
        run: |
          echo 'export PYENV_ROOT="$HOME/.pyenv"' >> $GITHUB_ENV
          echo 'export PATH="$PYENV_ROOT/bin:$PATH"' >> $GITHUB_ENV
          echo 'eval "$(pyenv init --path)"' >> $GITHUB_ENV
          echo 'eval "$(pyenv virtualenv-init -)"' >> $GITHUB_ENV
        shell: bash

      - name: Install Python versions with pyenv
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          pyenv install -s 3.10.11
          pyenv install -s 3.11.13
          pyenv install -s 3.12.11
          pyenv install -s 3.13.0

      - name: Run tox for Python 3.10
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          pyenv local 3.10.11
          tox -e py310

      - name: Run tox for Python 3.11
        run: |
          pyenv local 3.11.13
          tox -e py311

      - name: Run tox for Python 3.12
        run: |
          pyenv local 3.12.11
          tox -e py312

      - name: Run tox for Python 3.13
        run: |
          pyenv local 3.13.0
          tox -e py313
